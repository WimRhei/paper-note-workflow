name: Build pdffigures2 release asset

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out skill
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Build pdffigures2 assembly jar
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-pdffigures2-release.ps1

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdffigures2-assembly
          path: dist/pdffigures2-assembly.jar
